Description: Udagram Servers Infrastructure

Parameters:

  EnvironmentName:
    Type: String

  WebAppImageId:
    Type: String
    Default: ami-0866a3c8686eaeeba

  WebAppInstanceType:
    Type: String
    Default: t3.medium

Resources:

  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to Load Balancer

      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WebServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from Load Balancer

      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LBSecGroup

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WebAppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action:
              - sts:AssumeRole

      Policies:
        - PolicyName: S3ReadOnlyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - arn:aws:s3:::udagram-static-lipsa/*
                  - arn:aws:s3:::udagram-static-lipsa

  WebAppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref WebAppRole

  WebAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:

      LaunchTemplateData:

        ImageId: !Ref WebAppImageId

        InstanceType: !Ref WebAppInstanceType

        SecurityGroupIds:
          - !Ref WebServerSecGroup

        IamInstanceProfile:
          Arn: !GetAtt WebAppInstanceProfile.Arn

        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 10
              VolumeType: gp2
              DeleteOnTermination: true

        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            apt-get update -y
            apt-get install apache2 awscli -y

            systemctl start apache2
            systemctl enable apache2

            aws s3 cp s3://udagram-static-lipsa/index.html /var/www/html/index.html

  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:

      Port: 80
      Protocol: HTTP

      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 5
      HealthCheckIntervalSeconds: 30

  WebAppGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:

      VPCZoneIdentifier:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub "${EnvironmentName}-PUB-NETS"

      MinSize: "2"
      MaxSize: "4"

      TargetGroupARNs:
        - !Ref WebAppTargetGroup

      LaunchTemplate:
        LaunchTemplateId: !Ref WebAppLaunchTemplate
        Version: !GetAtt WebAppLaunchTemplate.LatestVersionNumber

  WebAppLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:

      Subnets:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub "${EnvironmentName}-PUB-NETS"

      SecurityGroups:
        - !Ref LBSecGroup

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:

      LoadBalancerArn: !Ref WebAppLB

      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup

Outputs:

  LoadBalancerDNS:
    Description: Load Balancer DNS Name
    Value: !Join ["", ["http://", !GetAtt WebAppLB.DNSName]]