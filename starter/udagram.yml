Description: Udagram Servers Infrastructure

Parameters:

  EnvironmentName:
    Type: String

  WebAppImageId:
    Type: String
    Default: ami-0866a3c8686eaeeba

  WebAppInstanceType:
    Type: String
    Default: t3.medium

Resources:

  LBSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP to Load Balancer
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WebServerSecGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from Load Balancer
      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref LBSecGroup

      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  WebAppLaunchConfig:
    Type: AWS::AutoScaling::LaunchConfiguration
    Properties:

      ImageId: !Ref WebAppImageId

      SecurityGroups:
        - !Ref WebServerSecGroup

      InstanceType: !Ref WebAppInstanceType

      UserData:
        Fn::Base64: |
          #!/bin/bash
          apt-get update -y
          apt-get install apache2 -y
          systemctl start apache2
          systemctl enable apache2
          echo "Udagram App Running Successfully" > /var/www/html/index.html

  WebAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Port: 80
      Protocol: HTTP

      VpcId:
        Fn::ImportValue: !Sub "${EnvironmentName}-VPCID"

      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 5
      HealthCheckIntervalSeconds: 30

  WebAppGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:

      VPCZoneIdentifier:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub "${EnvironmentName}-PUB-NETS"

      LaunchConfigurationName: !Ref WebAppLaunchConfig

      MinSize: "2"
      MaxSize: "4"

      TargetGroupARNs:
        - !Ref WebAppTargetGroup

  WebAppLB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:

      Subnets:
        Fn::Split:
          - ","
          - Fn::ImportValue: !Sub "${EnvironmentName}-PUB-NETS"

      SecurityGroups:
        - !Ref LBSecGroup

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:

      LoadBalancerArn: !Ref WebAppLB

      Port: 80
      Protocol: HTTP

      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebAppTargetGroup

Outputs:

  LoadBalancerDNS:
    Description: Load Balancer DNS Name
    Value: !Join ["", ["http://", !GetAtt WebAppLB.DNSName]]